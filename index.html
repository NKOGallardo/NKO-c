<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Under Maintenance</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050b18;
      --accent: #00e5ff;
      --accent2: #ff4d6d;
      --text: #e8f0fe;
      --muted: #6b7fa3;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated grid background */
    .grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 8s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: translateY(0); }
      100% { transform: translateY(60px); }
    }

    /* Glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      animation: orbFloat 6s ease-in-out infinite alternate;
    }
    .orb1 { width: 500px; height: 500px; background: var(--accent); top: -150px; left: -150px; animation-delay: 0s; }
    .orb2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -100px; animation-delay: -3s; }

    @keyframes orbFloat {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.1); }
    }

    /* Main card */
    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 64px 48px;
      max-width: 600px;
      border: 1px solid rgba(0,229,255,0.12);
      background: rgba(5, 11, 24, 0.7);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      animation: fadeUp 1s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Gear icon */
    .gear-wrap {
      margin-bottom: 32px;
      display: flex;
      justify-content: center;
      gap: 12px;
      align-items: center;
    }

    .gear {
      font-size: 52px;
      display: inline-block;
      line-height: 1;
    }
    .gear-big  { animation: spin 6s linear infinite; }
    .gear-sm   { font-size: 34px; animation: spinRev 4s linear infinite; }

    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes spinRev { to { transform: rotate(-360deg); } }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.1;
      animation: fadeUp 1s .2s cubic-bezier(.16,1,.3,1) both;
    }

    h1 span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.sub {
      margin-top: 16px;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
      animation: fadeUp 1s .35s cubic-bezier(.16,1,.3,1) both;
    }

    /* Progress bar */
    .progress-wrap {
      margin-top: 40px;
      animation: fadeUp 1s .5s cubic-bezier(.16,1,.3,1) both;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 10px;
      font-family: 'Syne', sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .bar {
      height: 6px;
      background: rgba(255,255,255,0.07);
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      animation: loadBar 3s 1s cubic-bezier(.4,0,.2,1) forwards;
      position: relative;
    }

    .bar-fill::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 40px;
      background: rgba(255,255,255,0.4);
      filter: blur(6px);
      border-radius: 999px;
    }

    @keyframes loadBar {
      to { width: 72%; }
    }

    /* Status dots */
    .status {
      margin-top: 36px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
      animation: fadeUp 1s .65s cubic-bezier(.16,1,.3,1) both;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.done    { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
    .dot.active  { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1.2s ease-in-out infinite; }
    .dot.pending { background: var(--muted); opacity: 0.4; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.7); }
    }

    footer {
      position: fixed;
      bottom: 24px;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      opacity: 0.5;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="grid"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="card">
    <div class="gear-wrap">
      <span class="gear gear-sm">⚙</span>
      <span class="gear gear-big">⚙</span>
      <span class="gear gear-sm">⚙</span>
    </div>

    <h1>We're Under<br/><span>Maintenance</span></h1>

    <p class="sub">
      Our team is making some improvements.<br/>
      We'll be back online shortly — hang tight!
    </p>

    <div class="progress-wrap">
      <div class="progress-label">
        <span>Progress</span>
        <span id="pct">0%</span>
      </div>
      <div class="bar">
        <div class="bar-fill"></div>
      </div>
    </div>

    <div class="status">
      <div class="status-item"><span class="dot done"></span>Database backup completed</div>
      <div class="status-item"><span class="dot done"></span>Dependencies updated</div>
      <div class="status-item"><span class="dot active"></span>Deploying new version…</div>
      <div class="status-item"><span class="dot pending"></span>Final checks pending</div>
    </div>
  </div>

  <footer>© 2026 &nbsp;·&nbsp; Be right back</footer>

  <script>
    // Animate the percentage counter alongside the bar
    const pct = document.getElementById('pct');
    let current = 0;
    const target = 72;
    const delay = 1000;
    const duration = 3000;
    const start = performance.now() + delay;

    function tick(now) {
      const elapsed = Math.max(0, now - start);
      const progress = Math.min(elapsed / duration, 1);
      // ease out cubic
      const eased = 1 - Math.pow(1 - progress, 3);
      current = Math.round(eased * target);
      pct.textContent = current + '%';
      if (progress < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  </script>
</body>
</html>
